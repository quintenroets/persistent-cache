]

[project.optional-dependencies]
dev = [
    "package-dev-tools >=0.8.1, <1",
    "package-dev-utils >=0.1.6, <1",
    "numpy >=1.26.0, <3",
    "torch >=1.26.0, <3",
]

[project.urls]
"Source Code" = "https://github.com/quintenroets/persistent-cache"

[project.scripts]
clear-persistent-cache = "persistent_cache.cli.clear_cache:entry_point"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.coverage.run]
command_line = "-m pytest tests"

[tool.coverage.report]
precision = 4
fail_under = 100

[tool.mypy]
strict = true
no_implicit_reexport = false

[tool.pytest.ini_options]
pythonpath = [
    "src", ".",
]

[tool.ruff]
fix = true

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "ANN401",   # annotated with Any
    "D",        # docstrings
    "D1",       # missing docstrings
    "D200",     # one-line docstring
    "D203",     # conflicts with D211
    "D205",     # blank line between summary and description
    "D212",     # conflicts with D213
    "D401",     # imperative first line
    "G004",     # logging f-string
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = [
    "F401"  # unused import
]
"tests/*" = [
    "S101"  # assert used
]

[tool.setuptools.package-data]
persistent_cache = ["py.typed"]
